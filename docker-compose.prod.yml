services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: '${POSTGRES_USER:?POSTGRES_USER is required}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}'
      POSTGRES_DB: '${POSTGRES_DB:?POSTGRES_DB is required}'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-newsletter}']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: '${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}'
      MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data
    ports:
      - '127.0.0.1:9000:9000'

  createbucket:
    image: minio/mc:latest
    environment:
      MINIO_ROOT_USER: '${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}'
      MINIO_ROOT_PASSWORD: '${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}'
      S3_BUCKET: '${S3_BUCKET:?S3_BUCKET is required}'
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
        mc anonymous set download "local/$${S3_BUCKET}"

  web:
    build:
      context: .
      target: production
    environment:
      NODE_ENV: production
      DATABASE_URL: '${DATABASE_URL:?DATABASE_URL is required}'
      APP_URL: '${APP_URL:?APP_URL is required}'
      AUTH_COOKIE_NAME: '${AUTH_COOKIE_NAME:-newsletter_session}'
      AUTH_MAGIC_LINK_TTL_MINUTES: '${AUTH_MAGIC_LINK_TTL_MINUTES:-15}'
      AUTH_SESSION_DAYS: '${AUTH_SESSION_DAYS:-30}'
      AUTH_ALLOWED_EMAILS: '${AUTH_ALLOWED_EMAILS:-}'
      AUTH_ALLOWED_EMAIL_DOMAINS: '${AUTH_ALLOWED_EMAIL_DOMAINS:-}'
      SMTP_HOST: '${SMTP_HOST:?SMTP_HOST is required}'
      SMTP_PORT: '${SMTP_PORT:-587}'
      SMTP_USER: '${SMTP_USER:?SMTP_USER is required}'
      SMTP_PASSWORD: '${SMTP_PASSWORD:?SMTP_PASSWORD is required}'
      SMTP_FROM: '${SMTP_FROM:?SMTP_FROM is required}'
      S3_ENDPOINT: http://minio:9000
      S3_REGION: '${S3_REGION:-us-east-1}'
      S3_ACCESS_KEY_ID: '${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}'
      S3_SECRET_ACCESS_KEY: '${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}'
      S3_BUCKET: '${S3_BUCKET:?S3_BUCKET is required}'
      PUBLIC_ASSET_BASE_URL: '${PUBLIC_ASSET_BASE_URL:?PUBLIC_ASSET_BASE_URL is required}'
    command: sh -c "pnpm db:ensure && pnpm start"
    ports:
      - '127.0.0.1:3000:3000'
    expose:
      - '3000'
    depends_on:
      db:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully

volumes:
  postgres-data:
  minio-data:
