services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: newsletter
      POSTGRES_PASSWORD: newsletter
      POSTGRES_DB: newsletter
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U newsletter']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/newsletter-assets
        mc anonymous set download local/newsletter-assets

  web:
    build: .
    env_file: .env.example
    environment:
      DATABASE_URL: postgres://newsletter:newsletter@db:5432/newsletter
      S3_ENDPOINT: http://minio:9000
      PUBLIC_ASSET_BASE_URL: http://localhost:9000/newsletter-assets
    command: sh -c "pnpm db:ensure && pnpm dev"
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully

volumes:
  postgres-data:
  minio-data:
