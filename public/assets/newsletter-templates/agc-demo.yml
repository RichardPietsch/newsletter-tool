                  "text": " richtet sich künftig an Mitglieder zwischen 32 und 40 Jahren und lädt in unregelmäßigen Abständen zu ausgewählten Veranstaltungen ein. Die Mitglieder dieser Altersgruppe werden hierzu künftig gesondert informiert.",
